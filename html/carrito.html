<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nintendo Store - Carrito</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./../css/style.css">
</head>
<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-dark bg-nintendo">
        <div class="container">
            <a class="navbar-brand" href="./../index.html">Nintendo Store</a>

            <div class="navbar-nav">
                <a class="nav-link fw-bold" href="consola.html">Consolas</a>
                <a class="nav-link" href="./juegos.html">Juegos</a>
                <a class="nav-link" href="./Accesorios.html">Accesorios</a>
                <a class="nav-link" href="./nosotros.html">Nosotros</a>
                <a class="nav-link active" href="./carrito.html">Carrito</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h1 class="text-center mb-4">Tu Carrito de Compras</h1>

        <div class="row">
            <div class="col-lg-8 mb-4">
                <div class="card shadow p-3">
                    <div class="table-responsive">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>Producto</th>
                                    <th>Precio</th>
                                    <th>Cantidad</th>
                                    <th>Subtotal</th>
                                    <th>Acción</th>
                                </tr>
                            </thead>
                            <tbody id="items-carrito">
                                </tbody>
                        </table>
                    </div>
                    <div class="d-flex justify-content-between mt-3">
                        <a href="consola.html" class="btn btn-secondary">Seguir Comprando</a>
                        <button class="btn btn-outline-danger" onclick="vaciarCarrito()">Vaciar Carrito</button>
                    </div>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="card shadow p-4 bg-dark text-white">
                    <h4 class="mb-3">Resumen de Orden</h4>
                    <hr class="bg-light">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <span class="fs-5">Total a Pagar:</span>
                        <span class="fs-3 fw-bold text-danger">$<span id="total-carrito" class="text-white">0.00</span></span>
                    </div>
                  <button class="btn btn-danger btn-lg w-100 fw-bold" onclick="procesarPago()">
    Proceder al Pago
</button>
                </div>
            </div>
        </div>
    </div>
  
    <footer class="bg-dark text-white text-center p-3 mt-auto">
        <h5>Nintendo Store</h5>
        <p>Proyecto académico 2026</p>
    </footer>



    <script src="./../js/script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
