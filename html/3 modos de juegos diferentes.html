<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nintendo Store - Inicio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .banner-rojo {
            background-color: #e60012; 
            padding: 60px 20px;       
        }
        .titulo-banner {
            color: #ffffff;
            font-size: 3.5rem;        
            font-weight: 800;         
            letter-spacing: -1px;     
        }

        .seccion-modos {
            background-color: #e60012; 
            padding-bottom: 60px;
        }
        .contenedor-mosaico {
            border-radius: 30px; 
            overflow: hidden;    
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }
        .col-modo {
            padding: 0 !important; 
        }
        .img-modo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .seccion-descripcion-tv {
            background-color: #d80011; 
            color: #ffffff;
        }

        .seccion-mario-kart {
            background: linear-gradient(to bottom, #e60012 55%, #ffffff 55%);
            width: 100%;
            padding: 60px 0 0 0;
            overflow: hidden;
        }

        .contenedor-escena {
            max-width: 1100px;
            height: 620px;
            margin: 0 auto;
        }

        .tv-contenedor {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            z-index: 1;
        }
        
        .video-tv-juego {
            width: 100%;
            height: auto;
            border: 14px solid #212529; 
            border-radius: 4px;
            display: block;
        }

        .dock-interactivo-wrapper {
            position: absolute;
            bottom: 40px;
            left: 20px;
            width: 260px;
            height: 180px;
            z-index: 3;
            cursor: pointer;
        }
        .dock-fijo {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            z-index: 5; 
        }
        .consola-deslizable {
            position: absolute;
            bottom: 15px;
            left: 5%;
            width: 90%;
            z-index: 2;
            transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .dock-interactivo-wrapper:hover .consola-deslizable {
            transform: translateY(-85px); 
        }

        .control-manos-contenedor {
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 340px;
            z-index: 4; 
            pointer-events: none; 
        }
        .img-control {
            width: 100%;
            height: auto;
        }

  
        .seccion-modo-portatil {
            background: linear-gradient(162deg, #ffffff 78%, #e60012 78%);
            width: 100%;
            padding: 80px 0 120px 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .encabezado-portatil {
            display: flex;
            align-items: center;
            gap: 25px;
            margin-bottom: 60px;
        }
        .bloque-icono-portatil {
            text-align: center;
        }
        .txt-modo-pequeno {
            font-size: 0.85rem;
            text-transform: uppercase;
            font-weight: bold;
            color: #212529;
            margin-top: 4px;
            letter-spacing: 0.5px;
        }
        .linea-separadora-portatil {
            width: 2px;
            height: 65px;
            background-color: #212529;
            opacity: 0.3;
        }
        .titulo-portatil-txt {
            font-size: 3rem;
            font-weight: 800;
            color: #212529;
            line-height: 1.1;
            letter-spacing: -1px;
        }

        .wrapper-consola-portatil {
            position: relative;
            width: 100%;
            max-width: 820px; 
            margin: 0 auto;
        }
        .img-base-oled {
            width: 100%;
            height: auto;
            display: block;
            position: relative;
            z-index: 1;
            pointer-events: none; 
        }

        
        .pantalla-video-portatil {
            position: absolute;
            top: 4.8%;       
            left: 13.92%;    
            width: 72.15%;   
            height: 90.4%;   
            z-index: 2;
            overflow: hidden;
            background-color: #000;
        }
        .pantalla-video-portatil video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light landing-navbar-bg">
        <div class="container">
            <a class="navbar-brand fw-bold" href="./../index.html">Nintendo Store</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="consola.html">Consolas</a>
                <a class="nav-link" href="juegos.html">Juegos</a>
                <a class="nav-link" href="Accesorios.html">Accesorios</a>
                <a class="nav-link" href="nosotros.html">Nosotros</a>
                <a class="nav-link" href="carrito.html">Carrito</a>
            </div>
        </div>
    </nav>

    <div class="banner-rojo text-center">
        <div class="container">
            <h1 class="titulo-banner m-0">
                Descubre<br>tres modos de juego<br>diferentes
            </h1>
        </div>
    </div>

    <div class="seccion-modos">
        <div class="container">
            <div class="row g-0 contenedor-mosaico">
                <div class="col-md-4 col-modo">
                    <img src="./../img/modo tv.avif" class="img-modo" alt="Jugando en TV">
                </div>
                <div class="col-md-4 col-modo">
                    <img src="./../img/modo portatil.avif" class="img-modo" alt="Jugando modo semiportátil">
                </div>
                <div class="col-md-4 col-modo">
                    <img src="./../img/modo semiportatil.avif" class="img-modo" alt="Jugando modo portátil">
                </div>
            </div>
        </div>
    </div>

    <div class="seccion-descripcion-tv py-5">
        <div class="container text-center">
            <div class="d-flex justify-content-center align-items-center flex-wrap gap-4 mb-4">
                <div class="text-center px-3" style="min-width: 100px;">
                    <div style="font-size: 2.5rem; line-height: 1;">📺</div>
                    <div class="fw-bold small mt-1 text-uppercase tracking-wider">Modo TV</div>
                </div>
                <div class="d-none d-md-block" style="width: 2px; height: 60px; background-color: #ffffff; opacity: 0.8;"></div>
                <div class="text-start">
                    <h2 class="m-0 fw-bold display-5" style="letter-spacing: -1px;">
                        Juega en la pantalla de tu televisor
                    </h2>
                </div>
            </div>
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <p class="fs-4 fw-normal text-white-50 l-base">
                        Coloca tu consola en la base incluida y disfruta una experiencia de juego tradicional en alta definición.
                    </p>
                </div>
            </div>
        </div>
    </div>

    <div class="seccion-mario-kart position-relative">
        <div class="container contenedor-escena position-relative">
            
            <div class="tv-contenedor">
                <video class="video-tv-juego shadow-lg" autoplay loop muted playsinline>
                    <source src="./../img/video juego mario 1.mp4" type="video/mp4">
                    Tu navegador no soporta la reproducción de videos.
                </video>
            </div>

            <div class="dock-interactivo-wrapper">
                <img src="./../img/pantalla de consola.avif" class="consola-deslizable" alt="Nintendo Switch">
                <img src="./../img/imagen consola.avif" class="dock-fijo" alt="Dock Blanco">
            </div>

            <div class="control-manos-contenedor">
                <img src="./../img/control completo nintendo.avif" class="img-control" alt="Sosteniendo Control Switch">
            </div>

        </div>
    </div>

    <div class="seccion-modo-portatil">
        <div class="container d-flex flex-column align-items-center">
            
            <div class="encabezado-portatil">
                <div class="bloque-icono-portatil">
                    <div style="font-size: 2.2rem; line-height: 1;">🎮</div>
                    <div class="txt-modo-pequeno">Modo portátil</div>
                </div>
                <div class="linea-separadora-portatil"></div>
                <div>
                    <h2 class="titulo-portatil-txt m-0">
                        Juega en<br>cualquier lugar
                    </h2>
                </div>
            </div>

            <div class="wrapper-consola-portatil">
                <img src="./../img/consola blanca.png" class="img-base-oled" alt="Nintendo Switch White Frame">
                
                <div class="pantalla-video-portatil">
                    <video autoplay loop muted playsinline>
                        <source src="./../img/video juego mario 2.mp4" type="video/mp4">
                        Tu navegador no soporta la reproducción de videos.
                    </video>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
